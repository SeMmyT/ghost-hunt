name: Build Ghost Hunt

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

jobs:
  # ── Windows PC Build ──────────────────────────────────────────
  build-windows:
    name: Build Windows (Steam/Steam Deck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: game-ci/unity-builder@v4
        with:
          targetPlatform: StandaloneWindows64
          buildName: GhostHunt
          unityVersion: auto

      - uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: build/StandaloneWindows64

  # ── Android / Quest Build ─────────────────────────────────────
  build-quest:
    name: Build Android (Quest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: game-ci/unity-builder@v4
        with:
          targetPlatform: Android
          buildName: GhostHunt
          unityVersion: auto
          androidExportType: androidPackage
          androidKeystoreName: ghost-hunt.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}

      - uses: actions/upload-artifact@v4
        with:
          name: build-quest
          path: build/Android

  # ── WebGL Build ───────────────────────────────────────────────
  build-webgl:
    name: Build WebGL (Browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: game-ci/unity-builder@v4
        with:
          targetPlatform: WebGL
          buildName: GhostHunt
          unityVersion: auto

      - uses: actions/upload-artifact@v4
        with:
          name: build-webgl
          path: build/WebGL

  # ── iOS Build ─────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: game-ci/unity-builder@v4
        with:
          targetPlatform: iOS
          buildName: GhostHunt
          unityVersion: auto

      - uses: actions/upload-artifact@v4
        with:
          name: build-ios
          path: build/iOS

  # ── Linux Build (Steam Deck native) ──────────────────────────
  build-linux:
    name: Build Linux (Steam Deck Native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: game-ci/unity-builder@v4
        with:
          targetPlatform: StandaloneLinux64
          buildName: GhostHunt
          unityVersion: auto

      - uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: build/StandaloneLinux64

  # ── macOS Build ───────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: game-ci/unity-builder@v4
        with:
          targetPlatform: StandaloneOSX
          buildName: GhostHunt
          unityVersion: auto

      - uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: build/StandaloneOSX
